# Backend stack (API + Postgres). Included from repo root `docker-compose.yml`.
#
# Run standalone from this directory:
#   docker compose up -d
#   docker compose up --build app
#   docker compose --profile fixtures run --rm fixtures
#   docker compose --profile test run --rm e2e
#
# For standalone usage in `server/`, Compose reads `server/.env` automatically.
# From repo root (merged compose), pass root env explicitly: `--env-file .env`.
#
# Defaults allow dev + test profiles in parallel (no host port clash).

services:
  postgres:
    image: postgres:16-alpine
    container_name: knostic-postgres
    restart: unless-stopped
    ports:
      - '${KNOSTIC_DEV_DB_PORT:-5433}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiny_inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tiny_inventory']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: knostic-app
    restart: unless-stopped
    ports:
      - '${KNOSTIC_DEV_APP_PORT:-3000}:3000'
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    stdin_open: true
    tty: true

  fixtures:
    profiles: [fixtures]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: knostic-seed-fixtures
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: ['seed:fixtures']

  postgres_test:
    profiles: [test]
    image: postgres:16-alpine
    container_name: knostic-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tiny_inventory_test
    ports:
      - '${KNOSTIC_TEST_DB_PUBLISH:-5544}:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tiny_inventory_test']
      interval: 3s
      timeout: 3s
      retries: 15

  e2e:
    profiles: [test]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: knostic-e2e-run
    depends_on:
      postgres_test:
        condition: service_healthy
    environment:
      PORT: '3001'
      DB_HOST: postgres_test
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tiny_inventory_test
      DB_SYNC: 'true'
    working_dir: /app
    command: ['test:e2e']

volumes:
  postgres_data:
  app_node_modules:
